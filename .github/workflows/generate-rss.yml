name: Generate RSS Feed

on:
  schedule:
    # Just after midnight PT.
    # PST (UTC-8): 00:05 AM PST = 08:05 AM UTC
    # PDT (UTC-7): runs at 01:05 AM PDT during daylight saving
    - cron: '5 8 * * *'

  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'openclaw-security-news.csv'
      - 'never_add.csv'

  workflow_dispatch:

jobs:
  generate-rss:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate RSS feed
        run: python scripts/generate_feed.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.xml
          if git diff --staged --quiet; then
            echo "No changes to feed.xml"
          else
            git commit -m "chore: update RSS feed $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
